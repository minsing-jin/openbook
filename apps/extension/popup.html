<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OpenBook Capture</title>
    <style>
      body {
        margin: 0;
        min-width: 320px;
        padding: 16px;
        font-family: ui-sans-serif, system-ui, sans-serif;
        background: #f6f1e9;
        color: #2f251d;
      }
      button {
        width: 100%;
        padding: 12px 14px;
        border-radius: 12px;
        border: 0;
        background: #2e5b4f;
        color: #fff;
        font-weight: 700;
        cursor: pointer;
      }
      pre {
        margin: 12px 0 0;
        padding: 12px;
        border-radius: 12px;
        background: #fffaf2;
        white-space: pre-wrap;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <button id="capture">Capture current page</button>
    <pre id="status">Idle</pre>
    <script src="popup.js" type="module"></script>
  </body>
</html>
